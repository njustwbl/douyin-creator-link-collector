services:
  postgres:
    image: pgvector/pgvector:0.8.5-pg17-bookworm
    container_name: ${CAREERAGENT_POSTGRES_CONTAINER:-careeragent-postgres}
    restart: unless-stopped
    shm_size: 512mb
    environment:
      POSTGRES_USER: ${CAREERAGENT_POSTGRES_USER:-careeragent}
      POSTGRES_PASSWORD: ${CAREERAGENT_POSTGRES_PASSWORD}
      POSTGRES_DB: ${CAREERAGENT_POSTGRES_DB:-careeragent}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${CAREERAGENT_POSTGRES_PORT:-54329}:5432"
    volumes:
      - "${CAREERAGENT_POSTGRES_DATA_DIR}:/var/lib/postgresql/data"
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${CAREERAGENT_POSTGRES_USER:-careeragent} -d ${CAREERAGENT_POSTGRES_DB:-careeragent}
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
